services:
  - type: pserv
    name: audit-fup-db
    region: oregon
    plan: free
    postgresVersion: 16
    postgresMachine: burstable

  - type: web
    name: audit-fup-backend
    region: oregon
    env:
      - key: DB_TYPE
        value: postgresql
      - key: JWT_SECRET
        generateValue: true
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    autoDeploy: true